node_type: llm
description: Drafts a short opinionated roast of the top HN story using Claude
inputs:
  - name: story_title
    type: string
    required: true
    description: Title of the HN story to roast
  - name: comments
    type: array
    required: true
    description: Top comments to use as context for the roast
outputs:
  - name: roast
    type: string
    description: A short punchy hot take generated by the LLM
